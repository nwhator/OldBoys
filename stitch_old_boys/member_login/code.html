<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .editorial-overlay {
            background: linear-gradient(to bottom, rgba(250, 250, 245, 0.85), rgba(250, 250, 245, 0.95));
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<main class="relative min-h-screen flex items-center justify-center p-6 overflow-hidden">
<!-- Background Architectural Texture/Heritage Photo -->
<div class="absolute inset-0 z-0">
<img alt="Background Heritage Texture" class="w-full h-full object-cover opacity-30 grayscale" data-alt="Monochrome close-up of colonial-era architectural details in Lagos, featuring intricate masonry and heavy mahogany doors with soft natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBIGq9C5BI4dncsmM89sgycIHBjFmV-x56o7WJUBRvy8INQ9vzOC2ZpnG5DSnGSdE15YI8uJd_5WMHblQGJ74BnBCl-XrJTJDm95KWJMUQucR-mQpIcVkSshL89GADbk7OqIK6vTbZa4S3oT8EENx_VQT1sRur3hirkXn5PRn7NwoOocA8Qeh-hbk70u7y1MPk2Dp_2ftVdGLFPzEJaEnrn4P8QCk6kE1mXOPxOi-PjUjuFqtoAs_7Ev62JudfQMGZzLDwskvgHKuA"/>
<div class="absolute inset-0 editorial-overlay"></div>
</div>
<!-- The Sovereign Login Shell -->
<div class="relative z-10 w-full max-w-[480px]">
<!-- Branding Header -->
<div class="text-center mb-12">
<div class="mb-6 inline-block">
<div class="w-24 h-24 mx-auto bg-primary-container p-4 rounded-full shadow-[0_20px_40px_rgba(0,35,102,0.15)] flex items-center justify-center">
<img alt="Lagos Heritage Crest" class="w-16 h-16 object-contain" data-alt="Elegant gold and royal blue heraldic crest featuring a traditional Nigerian crown and open book motifs in a minimalist modern style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAk5BwsAY1IbE1T18RwLvoI7F3zEclVOXm9FsgxuIiLHzEG2MFM2Qhk9kEJyxPE5bDtcs6R-67htzOyDzdy6cg-u8n-lS3VWK0tN0opBFZRkpV6Ha8oF35SCoMH-k4j9dA-cejl7-X4_xIlSHOKT4KX6rgf9kM9v-sSZZuIXulAs3UD4u0n0P8zDFs-LExJfY_Lvn1OoUKH04HPh--A4Ri_DXoqaVOaAUnjR84zpSnoOz77h3I6pn4XfQtE-bCQxsqGcW4nSdkwFD8"/>
</div>
</div>
<h1 class="font-headline text-3xl md:text-4xl text-primary font-bold tracking-tight mb-2">The Sovereign Archive</h1>
<p class="font-body text-sm uppercase tracking-[0.2em] text-secondary font-semibold">Excellence &amp; Legacy</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-10 md:p-12 shadow-[0_40px_80px_rgba(0,17,58,0.08)] rounded-xl border border-outline-variant/10">
<div class="mb-10">
<h2 class="font-headline text-2xl text-on-surface font-bold">Portal Access</h2>
<p class="text-on-surface-variant/70 text-sm mt-2">Sign in to the Lagos Heritage Alumni portal.</p>
</div>
<form action="#" class="space-y-8" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="email">Institutional Email</label>
<div class="relative group">
<span class="absolute left-0 bottom-3 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">mail</span>
</span>
<input class="w-full pl-8 pr-0 py-3 bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-secondary text-on-surface placeholder:text-outline-variant/50 transition-all font-body text-base" id="email" name="email" placeholder="name@alumni.heritage.edu" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="password">Secure Key</label>
<a class="text-xs font-label text-secondary hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<span class="absolute left-0 bottom-3 text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</span>
<input class="w-full pl-8 pr-0 py-3 bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-secondary text-on-surface placeholder:text-outline-variant/50 transition-all font-body text-base" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary focus:ring-offset-surface" id="remember" name="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant font-medium select-none" for="remember">Maintain session for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded font-label text-sm uppercase tracking-widest font-bold hover:shadow-[0_10px_30px_rgba(0,17,58,0.2)] hover:scale-[1.01] active:scale-[0.99] transition-all duration-300" type="submit">
                        Authorize Access
                    </button>
</form>
<div class="mt-10 flex items-center gap-4">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="text-[10px] font-label uppercase tracking-tighter text-outline-variant font-bold">Professional Gateway</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- LinkedIn Sign In -->
<div class="mt-8">
<button class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant hover:bg-surface-container-low transition-all duration-300 group">
<svg class="w-5 h-5 fill-on-surface-variant group-hover:fill-primary transition-colors" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"></path>
</svg>
<span class="font-label text-sm font-semibold text-on-surface-variant">Sign in with LinkedIn</span>
</button>
</div>
</div>
<!-- Footer Message -->
<div class="mt-12 text-center">
<p class="text-xs text-on-surface-variant/60 font-label uppercase tracking-[0.15em]">
                    Heritage Alumni Association © 2024
                </p>
<div class="mt-4 flex justify-center gap-8">
<a class="text-[10px] font-label uppercase tracking-widest text-outline-variant hover:text-primary transition-colors" href="#">Privacy Charter</a>
<a class="text-[10px] font-label uppercase tracking-widest text-outline-variant hover:text-primary transition-colors" href="#">Support Center</a>
</div>
</div>
</div>
</main>
<!-- Decoration Element: Subtle Gold Line -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-primary opacity-80 z-50"></div>
</body></html>
